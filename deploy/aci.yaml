# Azure Container Instances (ACI) deployment for the AgentGate proxy.
#
# This is a declarative definition of the container group. Deploy it with:
#
#   az container create --resource-group agentgate-rg --file deploy/aci.yaml
#
# It runs the proxy as a single public container and gives it the FQDN
#   http://agentgate-proxy.<region>.azurecontainer.io:8000
#
# Before deploying, push your image to a registry and set `image:` below
# (Azure Container Registry, Docker Hub, etc.). See deploy/deploy-azure.sh
# for a script that builds, pushes, and deploys in one go.

apiVersion: 2021-10-01
location: eastus
name: agentgate-proxy
type: Microsoft.ContainerInstance/containerGroups
properties:
  osType: Linux
  restartPolicy: Always
  containers:
    - name: agentgate-proxy
      properties:
        image: <your-registry>/agentgate:latest   # <-- set this to your pushed image
        ports:
          - port: 8000
        resources:
          requests:
            cpu: 1
            memoryInGB: 1.5
        environmentVariables:
          - name: AGENTGATE_MODE
            value: mock
          # For real mode, supply these as secureValue (not plain value):
          # - name: AWS_ACCESS_KEY_ID
          #   secureValue: <key>
          # - name: AWS_SECRET_ACCESS_KEY
          #   secureValue: <secret>
          # - name: AWS_DEFAULT_REGION
          #   value: us-east-1
          # - name: AGENTGATE_API_KEYS
          #   secureValue: '{"alice-key": {"user_arn": "arn:aws:iam::<acct>:user/alice", "agent_id": "agent-1"}}'
  ipAddress:
    type: Public
    dnsNameLabel: agentgate-proxy            # -> agentgate-proxy.<region>.azurecontainer.io
    ports:
      - protocol: tcp
        port: 8000
